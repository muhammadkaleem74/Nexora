<form #form="ngForm" (ngSubmit)="save()" autocomplete="off">
    <abp-modal-header [title]="isEdit ? 'Edit Grade Level' : 'Add Grade Level'" (onCloseClick)="bsModalRef.hide()"></abp-modal-header>

    <div class="modal-body">

        <div class="form-group required">
            <label class="col-form-label">Campus</label>
            <select class="form-control" name="campusId" [(ngModel)]="model.campusId" required>
                <option [value]="0" disabled>Select campus…</option>
                @for (c of campuses; track c.id) {
                    <option [value]="c.id">{{ c.name }}</option>
                }
            </select>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
            <div class="form-group required">
                <label class="col-form-label">Name</label>
                <input type="text" class="form-control" name="name" [(ngModel)]="model.name" required maxlength="50" />
            </div>
            <div class="form-group">
                <label class="col-form-label">Code</label>
                <input type="text" class="form-control" name="code" [(ngModel)]="model.code" maxlength="20" />
            </div>
        </div>

        <div class="form-group">
            <label class="col-form-label">Sort Order</label>
            <input type="number" class="form-control" name="sortOrder" [(ngModel)]="model.sortOrder" min="0" />
        </div>

        <div class="form-group">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="isActive" name="isActive" [(ngModel)]="model.isActive" />
                <label class="form-check-label" for="isActive">Active</label>
            </div>
        </div>

    </div>

    <abp-modal-footer
        [cancelDisabled]="saving"
        [saveDisabled]="!form.form.valid || saving"
        (onCancelClick)="bsModalRef.hide()">
    </abp-modal-footer>
</form>
