<form #form="ngForm" (ngSubmit)="save()" autocomplete="off">
    <abp-modal-header [title]="isEdit ? 'Edit Section' : 'Add Section'" (onCloseClick)="bsModalRef.hide()"></abp-modal-header>

    <div class="modal-body">

        <div class="form-group required">
            <label class="col-form-label">Grade Level</label>
            <select class="form-control" name="gradeLevelId" [(ngModel)]="model.gradeLevelId" required>
                <option [value]="0" disabled>Select grade level…</option>
                @for (g of gradeLevels; track g.id) {
                    <option [value]="g.id">{{ g.campusName }} — {{ g.name }}</option>
                }
            </select>
        </div>

        <div class="form-group required">
            <label class="col-form-label">Name</label>
            <input type="text" class="form-control" name="name" [(ngModel)]="model.name" required maxlength="20" />
        </div>

        <div class="form-group">
            <label class="col-form-label">Capacity</label>
            <input type="number" class="form-control" name="capacity" [(ngModel)]="model.capacity" min="0" />
        </div>

    </div>

    <abp-modal-footer
        [cancelDisabled]="saving"
        [saveDisabled]="!form.form.valid || saving"
        (onCancelClick)="bsModalRef.hide()">
    </abp-modal-footer>
</form>
