<form #form="ngForm" (ngSubmit)="save()" autocomplete="off">
    <abp-modal-header title="Review Document" (onCloseClick)="bsModalRef.hide()"></abp-modal-header>

    <div class="modal-body">

        <div style="padding:12px 16px; background:var(--nx-surface-hover); border-radius:6px; margin-bottom:20px; font-size:13.5px;">
            <i class="fas fa-file-alt" style="margin-right:8px; color:var(--nx-text-muted);"></i>
            <strong>{{ document?.fileName }}</strong>
        </div>

        <div class="form-group required">
            <label class="col-form-label">Verification Status</label>
            <select class="form-control" name="verificationStatus" [(ngModel)]="model.verificationStatus" required>
                <option [value]="VerificationStatus.Pending">Pending</option>
                <option [value]="VerificationStatus.Verified">Verified</option>
                <option [value]="VerificationStatus.Rejected">Rejected</option>
            </select>
        </div>

        @if (isRejection) {
            <div class="form-group required">
                <label class="col-form-label">Rejection Note</label>
                <textarea class="form-control" name="rejectionNote"
                    [(ngModel)]="model.rejectionNote"
                    rows="3" maxlength="300" required
                    placeholder="Explain why this document is being rejected…"></textarea>
            </div>
        }

    </div>

    <abp-modal-footer
        [cancelDisabled]="saving"
        [saveDisabled]="!form.form.valid || saving"
        (onCancelClick)="bsModalRef.hide()">
    </abp-modal-footer>
</form>
