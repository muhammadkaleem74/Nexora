<form #form="ngForm" (ngSubmit)="save()" autocomplete="off">
    <abp-modal-header title="Schedule Assessment" (onCloseClick)="bsModalRef.hide()"></abp-modal-header>

    <div class="modal-body">

        <div class="form-group required">
            <label class="col-form-label">Assessment Type</label>
            <select class="form-control" name="assessmentType" [(ngModel)]="model.assessmentType" required>
                @for (at of assessmentTypes; track at.value) {
                    <option [value]="at.value">{{ at.label }}</option>
                }
            </select>
        </div>

        <div class="form-group">
            <label class="col-form-label">Scheduled Date</label>
            <input type="date" class="form-control" name="scheduledDate"
                [(ngModel)]="model.scheduledDate" />
        </div>

    </div>

    <abp-modal-footer
        [cancelDisabled]="saving"
        [saveDisabled]="!form.form.valid || saving"
        (onCancelClick)="bsModalRef.hide()">
    </abp-modal-footer>
</form>
