<form #createForm="ngForm" (ngSubmit)="save()" autocomplete="off">
    <abp-modal-header title="New Admission Application" (onCloseClick)="bsModalRef.hide()"></abp-modal-header>

    <div class="modal-body">

        <!-- Academic Info -->
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
            <div class="form-group required">
                <label class="col-form-label">Academic Year</label>
                <select class="form-control" name="academicYearId" [(ngModel)]="model.academicYearId" required #ayModel="ngModel">
                    <option [value]="0" disabled>Select year…</option>
                    @for (y of academicYears; track y.id) {
                        <option [value]="y.id">{{ y.name }}</option>
                    }
                </select>
            </div>
            <div class="form-group required">
                <label class="col-form-label">Campus</label>
                <select class="form-control" name="campusId" [(ngModel)]="model.campusId" required (ngModelChange)="onCampusChange()">
                    <option [value]="0" disabled>Select campus…</option>
                    @for (c of campuses; track c.id) {
                        <option [value]="c.id">{{ c.name }}</option>
                    }
                </select>
            </div>
        </div>

        <div class="form-group required">
            <label class="col-form-label">Desired Grade Level</label>
            <select class="form-control" name="desiredGradeLevelId" [(ngModel)]="model.desiredGradeLevelId" required>
                <option [value]="0" disabled>{{ model.campusId ? 'Select grade…' : 'Choose campus first' }}</option>
                @for (g of gradeLevels; track g.id) {
                    <option [value]="g.id">{{ g.name }}</option>
                }
            </select>
        </div>

        <hr style="border-color:var(--nx-border); margin:16px 0;" />

        <!-- Applicant Details -->
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
            <div class="form-group required">
                <label class="col-form-label">First Name</label>
                <input type="text" class="form-control" name="firstName" [(ngModel)]="model.firstName"
                    required maxlength="100" />
            </div>
            <div class="form-group required">
                <label class="col-form-label">Last Name</label>
                <input type="text" class="form-control" name="lastName" [(ngModel)]="model.lastName"
                    required maxlength="100" />
            </div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
            <div class="form-group required">
                <label class="col-form-label">Date of Birth</label>
                <input type="date" class="form-control" name="dateOfBirth" [(ngModel)]="model.dateOfBirth" required />
            </div>
            <div class="form-group required">
                <label class="col-form-label">Gender</label>
                <select class="form-control" name="gender" [(ngModel)]="model.gender" required>
                    <option [value]="1">Male</option>
                    <option [value]="2">Female</option>
                    <option [value]="3">Other</option>
                </select>
            </div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
            <div class="form-group">
                <label class="col-form-label">Nationality</label>
                <input type="text" class="form-control" name="nationality" [(ngModel)]="model.nationality" maxlength="100" />
            </div>
            <div class="form-group">
                <label class="col-form-label">Religion</label>
                <input type="text" class="form-control" name="religion" [(ngModel)]="model.religion" maxlength="50" />
            </div>
        </div>

        <hr style="border-color:var(--nx-border); margin:16px 0;" />

        <!-- Previous School -->
        <p style="font-size:13px; font-weight:600; color:var(--nx-text-muted); margin-bottom:12px; text-transform:uppercase; letter-spacing:.05em;">
            Previous School (Optional)
        </p>
        <div class="form-group">
            <label class="col-form-label">School Name</label>
            <input type="text" class="form-control" name="previousSchoolName" [(ngModel)]="model.previousSchoolName" maxlength="200" />
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
            <div class="form-group">
                <label class="col-form-label">Board / Curriculum</label>
                <input type="text" class="form-control" name="previousSchoolBoard" [(ngModel)]="model.previousSchoolBoard" maxlength="100" />
            </div>
            <div class="form-group">
                <label class="col-form-label">Last Grade</label>
                <input type="text" class="form-control" name="previousGradeLevel" [(ngModel)]="model.previousGradeLevel" maxlength="50" />
            </div>
        </div>

    </div>

    <abp-modal-footer
        [cancelDisabled]="saving"
        [saveDisabled]="!createForm.form.valid || saving"
        (onCancelClick)="bsModalRef.hide()">
    </abp-modal-footer>
</form>
