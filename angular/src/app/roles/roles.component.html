<div [@routerTransition]>

    <div class="nx-page-header">
        <div>
            <h1 class="nx-page-title">{{ 'Roles' | localize }}</h1>
            <p class="nx-page-subtitle">Manage roles and their permissions</p>
        </div>
        <a href="javascript:;" class="nx-btn nx-btn--primary" (click)="createRole()">
            <i class="fas fa-plus"></i>
            {{ 'Create' | localize }}
        </a>
    </div>

    <div class="nx-card">

        <!-- Toolbar -->
        <div class="nx-toolbar">
            <div class="nx-toolbar__left">
                <div class="nx-toolbar__search">
                    <i class="fas fa-search"></i>
                    <input
                        type="text"
                        name="keyword"
                        [placeholder]="'SearchWithThreeDot' | localize"
                        [(ngModel)]="keyword"
                        (keyup.enter)="list()" />
                </div>
                <button class="nx-btn nx-btn--secondary" (click)="list()">
                    {{ 'Search' | localize }}
                </button>
            </div>
        </div>

        <!-- Table -->
        <div class="primeng-datatable-container">
            <p-table
                #dataTable
                sortMode="multiple"
                (onLazyLoad)="list($event)"
                [value]="primengTableHelper.records"
                rows="{{ primengTableHelper.defaultRecordsCountPerPage }}"
                [paginator]="false"
                [lazy]="true"
                [tableStyle]="{ 'min-width': '50rem' }">
                <ng-template pTemplate="header">
                    <tr>
                        <th pSortableColumn="name">
                            {{ 'RoleName' | localize }}
                            <p-sortIcon field="name"></p-sortIcon>
                        </th>
                        <th pSortableColumn="displayName">
                            {{ 'DisplayName' | localize }}
                            <p-sortIcon field="displayName"></p-sortIcon>
                        </th>
                        <th>{{ 'Actions' | localize }}</th>
                    </tr>
                </ng-template>
                <ng-template pTemplate="body" let-record="$implicit">
                    <tr>
                        <td>
                            <span style="font-weight:500;">{{ record.name }}</span>
                        </td>
                        <td style="color:var(--nx-text-muted);">{{ record.displayName }}</td>
                        <td>
                            <div style="display:flex; gap:6px;">
                                <button type="button" class="nx-btn nx-btn--secondary nx-btn--sm" (click)="editRole(record)">
                                    <i class="fas fa-pen"></i>
                                    {{ 'Edit' | localize }}
                                </button>
                                <button type="button" class="nx-btn nx-btn--danger nx-btn--sm" (click)="delete(record)">
                                    <i class="fas fa-trash"></i>
                                    {{ 'Delete' | localize }}
                                </button>
                            </div>
                        </td>
                    </tr>
                </ng-template>
            </p-table>
            <div class="primeng-no-data" *ngIf="primengTableHelper.totalRecordsCount == 0">
                {{ 'NoData' | localize }}
            </div>
        </div>

        <!-- Footer / Pagination -->
        <div class="nx-card__footer">
            <button class="nx-btn nx-btn--ghost nx-btn--sm" (click)="refresh()">
                <i class="fas fa-redo-alt"></i>
            </button>
            <div class="primeng-paging-container">
                <p-paginator
                    [rows]="primengTableHelper.defaultRecordsCountPerPage"
                    #paginator
                    (onPageChange)="list($event)"
                    [totalRecords]="primengTableHelper.totalRecordsCount"
                    [rowsPerPageOptions]="primengTableHelper.predefinedRecordsCountPerPage"
                    [showCurrentPageReport]="true"
                    [currentPageReportTemplate]="'TotalRecordsCount' | localize: primengTableHelper.totalRecordsCount">
                </p-paginator>
            </div>
        </div>

    </div>
</div>
