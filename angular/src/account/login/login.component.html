<div [@routerTransition]>
    <div class="nx-auth-heading">
        <h1 class="nx-auth-title">{{ 'LogIn' | localize }}</h1>
        <p class="nx-auth-subtitle">Sign in to your account to continue</p>
    </div>

    <form novalidate autocomplete="off" #loginForm="ngForm" (ngSubmit)="login()">

        <div class="nx-field">
            <label class="nx-field__label">{{ 'UserNameOrEmail' | localize }}</label>
            <input
                type="text"
                class="nx-field__input"
                name="userNameOrEmailAddress"
                [(ngModel)]="authService.authenticateModel.userNameOrEmailAddress"
                [placeholder]="'UserNameOrEmail' | localize"
                required
                maxlength="256"
                #userNameOrEmailAddressModel="ngModel"
                #userNameOrEmailAddressEl />
            <abp-validation-summary
                [control]="userNameOrEmailAddressModel"
                [controlEl]="userNameOrEmailAddressEl">
            </abp-validation-summary>
        </div>

        <div class="nx-field">
            <label class="nx-field__label">{{ 'Password' | localize }}</label>
            <input
                type="password"
                class="nx-field__input"
                name="password"
                [(ngModel)]="authService.authenticateModel.password"
                [placeholder]="'Password' | localize"
                required
                maxlength="32"
                #passwordModel="ngModel"
                #passwordEl />
            <abp-validation-summary [control]="passwordModel" [controlEl]="passwordEl">
            </abp-validation-summary>
        </div>

        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;">
            <label class="nx-checkbox-row" style="margin:0;">
                <input
                    type="checkbox"
                    name="rememberMe"
                    [(ngModel)]="authService.rememberMe" />
                <span style="font-size:13.5px; color:var(--nx-text-muted);">{{ 'RememberMe' | localize }}</span>
            </label>
        </div>

        <button
            type="submit"
            class="nx-btn nx-btn--primary nx-btn--full"
            style="height:40px; font-size:14px;"
            [disabled]="!loginForm.form.valid || submitting">
            {{ 'LogIn' | localize }}
        </button>

    </form>

    @if (isSelfRegistrationAllowed) {
        <div class="nx-auth-footer">
            Don't have an account?
            <a [routerLink]="['../register']">{{ 'Register' | localize }}</a>
        </div>
    }
</div>
