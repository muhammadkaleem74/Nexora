<div [@routerTransition]>
    <div class="nx-auth-heading">
        <h1 class="nx-auth-title">{{ 'Register' | localize }}</h1>
        <p class="nx-auth-subtitle">Create a new account to get started</p>
    </div>

    <form autocomplete="off" #registerForm="ngForm" (ngSubmit)="save()">

        <div class="nx-field">
            <label class="nx-field__label">{{ 'Name' | localize }}</label>
            <input type="text" class="nx-field__input" name="name"
                [placeholder]="'Name' | localize" required maxlength="64"
                [(ngModel)]="model.name" #nameModel="ngModel" #nameEl />
            <abp-validation-summary [control]="nameModel" [controlEl]="nameEl"></abp-validation-summary>
        </div>

        <div class="nx-field">
            <label class="nx-field__label">{{ 'Surname' | localize }}</label>
            <input type="text" class="nx-field__input" name="surname"
                [placeholder]="'Surname' | localize" required maxlength="64"
                [(ngModel)]="model.surname" #surnameModel="ngModel" #surnameEl />
            <abp-validation-summary [control]="surnameModel" [controlEl]="surnameEl"></abp-validation-summary>
        </div>

        <div class="nx-field">
            <label class="nx-field__label">{{ 'EmailAddress' | localize }}</label>
            <input type="email" class="nx-field__input" name="emailAddress"
                [placeholder]="'EmailAddress' | localize" required maxlength="256"
                pattern="^\w+([\.-]?\w+)*@\w+([\.-]?\w+)*(\.\w{1,})+$"
                [(ngModel)]="model.emailAddress" #emailAddressModel="ngModel" #emailAddressEl />
            <abp-validation-summary [control]="emailAddressModel" [controlEl]="emailAddressEl"></abp-validation-summary>
        </div>

        <div class="nx-field">
            <label class="nx-field__label">{{ 'UserName' | localize }}</label>
            <input type="text" class="nx-field__input" name="userName"
                [placeholder]="'UserName' | localize" required maxlength="32"
                [(ngModel)]="model.userName" #userNameModel="ngModel" #userNameEl />
            <abp-validation-summary [control]="userNameModel" [controlEl]="userNameEl"></abp-validation-summary>
        </div>

        <div class="nx-field">
            <label class="nx-field__label">{{ 'Password' | localize }}</label>
            <input type="password" class="nx-field__input" name="password"
                [placeholder]="'Password' | localize" required maxlength="32"
                [(ngModel)]="model.password" #passwordModel="ngModel" #passwordEl />
            <abp-validation-summary [control]="passwordModel" [controlEl]="passwordEl"></abp-validation-summary>
        </div>

        <div style="display:flex; gap:8px; margin-top:4px;">
            <a [routerLink]="['../login']" class="nx-btn nx-btn--secondary" style="flex:1; justify-content:center;">
                <i class="fas fa-arrow-left"></i>
                {{ 'Back' | localize }}
            </a>
            <button type="submit" class="nx-btn nx-btn--primary"
                style="flex:2; justify-content:center; height:40px;"
                [disabled]="!registerForm.form.valid || saving">
                {{ 'Register' | localize }}
            </button>
        </div>

    </form>
</div>
